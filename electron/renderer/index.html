<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Takt</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Takt</h1>
          <p>Keyboard sounds for Windows</p>
        </div>
        <div id="status" class="status">Checking...</div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2>Settings</h2>
          <button id="openConfig" class="link-button">Config file</button>
        </div>

        <div class="settings-grid">
          <label class="field">
            <span>Mode</span>
            <div class="select-wrap">
              <select id="mode">
                <option value="keys">Clean key sounds</option>
                <option value="piano">Random piano</option>
                <option value="guitar">Random guitar</option>
                <option value="chords">Pop chords</option>
                <option value="melody">Pop lead</option>
              </select>
            </div>
            <small id="modeHint">Short clean mechanical sounds on each keypress.</small>
          </label>

          <label class="field profile-field">
            <span>Profile</span>
            <div class="select-wrap">
              <select id="profile">
                <option value="clean-muted">Soft muted</option>
                <option value="clean-thock">Deep soft</option>
                <option value="soft-linear">Light smooth</option>
                <option value="studio-pop">Bright clean</option>
                <option value="silent-tactile">Very quiet</option>
                <option value="holy-panda">Rounded pop</option>
                <option value="oil-king">Low muted</option>
                <option value="topre">Soft dome</option>
                <option value="ink-black">Low thock</option>
              </select>
            </div>
            <small id="profileHint">Rounded tactile thock with a clean bottom-out.</small>
          </label>

          <label class="field volume-field">
            <span>Volume <strong id="volumeValue">65%</strong></span>
            <input id="volume" type="range" min="0" max="100" value="65" />
          </label>

          <label class="toggle">
            <input id="autostart" type="checkbox" />
            <span>
              <strong>Launch on sign-in</strong>
              <small>Start the sound engine when Windows starts.</small>
            </span>
          </label>
        </div>

        <div class="actions">
          <button id="apply" class="secondary">Save</button>
          <button id="restart" class="primary">Apply & restart</button>
          <button id="stop" class="ghost">Stop sound</button>
        </div>
      </section>

      <p class="footer">Local only. No telemetry. No typed text is stored.</p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
